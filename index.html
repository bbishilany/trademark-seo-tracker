    // ── State ──
    let completedState = {};
    let notesState = {};

    // ── localStorage (write-through cache + offline fallback) ──
    const STORAGE_KEY = 'trademark-seo-fixes';
    const NOTES_KEY = 'trademark-seo-notes';

    function cacheCompleted() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(completedState)); } catch {}
    }
    function cacheNotes() {
        try { localStorage.setItem(NOTES_KEY, JSON.stringify(notesState)); } catch {}
    }
    function loadCachedCompleted() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }
    function loadCachedNotes() {
        try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || {}; } catch { return {}; }
    }

    function getAllFixes() {
        return phases.flatMap(p => p.fixes);
    }

    function updateProgress() {
        const all = getAllFixes();
        const done = all.filter(f => completedState[f.id]).length;
        document.getElementById('progressCount').textContent = done;
        document.getElementById('totalCount').textContent = all.length;
        document.getElementById('progressFill').style.width = `${(done / all.length) * 100}%`;
    }

    function renderFixes() {
        const container = document.getElementById('fixList');
        const priorityLabels = { critical: 'Critical', high: 'High', medium: 'Medium' };

        let html = '';
        phases.forEach(phase => {
            html += `<div class="phase-section">`;
            html += `<div class="phase-header"><span class="phase-badge">${phase.badge}</span><h2>${phase.title}</h2></div>`;
            html += `<div class="phase-subtitle">${phase.subtitle}</div>`;
            if (phase.callout) html += `<div class="info-card">${phase.callout}</div>`;

            const groups = { critical: [], high: [], medium: [] };
            phase.fixes.forEach(f => groups[f.priority].push(f));

            for (const [priority, items] of Object.entries(groups)) {
                if (items.length === 0) continue;
                html += `<div class="priority-section priority-${priority}">`;
                html += `<div class="priority-header"><span class="priority-badge">${priorityLabels[priority]}</span><h3>${items.length} ${items.length === 1 ? 'item' : 'items'}</h3></div>`;

                items.forEach(fix => {
                    const done = completedState[fix.id] || false;
                    const note = notesState[fix.id] || '';
                    const hasNote = note.trim().length > 0;
                    html += `
                    <div class="fix-card ${done ? 'completed' : ''}" data-id="${fix.id}">
                        <div class="fix-header">
                            <div class="fix-checkbox ${done ? 'checked' : ''}" data-id="${fix.id}"></div>
                            <span class="fix-title">${fix.title}</span>
                            <span class="fix-note-flag ${hasNote ? 'visible' : ''}" data-flag="${fix.id}">has note</span>
                            <span class="fix-impact">${fix.impact}</span>
                            <span class="fix-expand">&#9662;</span>
                        </div>
                        <div class="fix-details">
                            <h4>What's Wrong</h4>
                            <p>${fix.description}</p>
                            <h4>How to Fix</h4>
                            ${fix.fix}
                            <h4>Affected Pages</h4>
                            <div class="affected-pages">${fix.affected.replace(/\n/g, '<br>')}</div>
                            <div class="notes-section">
                                <h4><span class="note-indicator ${hasNote ? 'has-note' : ''}" data-id="${fix.id}"></span> Notes / Blockers</h4>
                                <textarea class="notes-textarea" data-id="${fix.id}" placeholder="Stuck? Note what's blocking you here...">${note}</textarea>
                                <div class="note-saved" data-saved="${fix.id}">Saved</div>
                            </div>
                        </div>
                    </div>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
        });

        container.innerHTML = html;
        updateProgress();
    }

    // ── Update a single card without full re-render ──
    function updateCard(id) {
        const card = document.querySelector(`.fix-card[data-id="${id}"]`);
        if (!card) return;
        const done = completedState[id] || false;
        const note = notesState[id] || '';
        card.classList.toggle('completed', done);
        const cb = card.querySelector('.fix-checkbox');
        if (cb) cb.classList.toggle('checked', done);
        const textarea = card.querySelector('.notes-textarea');
        if (textarea && textarea !== document.activeElement) textarea.value = note;
        const indicator = card.querySelector('.note-indicator');
        if (indicator) indicator.classList.toggle('has-note', note.trim().length > 0);
        const flag = card.querySelector('.fix-note-flag');
        if (flag) flag.classList.toggle('visible', note.trim().length > 0);
        updateProgress();
    }

    // ── Supabase: upsert a row ──
    async function upsertRow(id, fields) {
        const row = { id, ...fields, updated_at: new Date().toISOString() };
        const { error } = await sb.from('seo_tracker').upsert(row);
        if (error) console.error('Supabase upsert error:', error);
    }

    // ── Supabase: seed done flags ──
    async function seedDoneFlags(existingIds) {
        const toSeed = getAllFixes().filter(f => f.done && !existingIds.has(f.id));
        if (toSeed.length === 0) return;
        const rows = toSeed.map(f => ({ id: f.id, completed: true, note: '', updated_at: new Date().toISOString() }));
        const { error } = await sb.from('seo_tracker').upsert(rows);
        if (error) console.error('Seed error:', error);
        toSeed.forEach(f => { completedState[f.id] = true; });
    }

    // ── Supabase: load initial state ──
    async function loadFromSupabase() {
        const { data, error } = await sb.from('seo_tracker').select('*');
        if (error) {
            console.warn('Supabase load failed, using localStorage cache:', error);
            completedState = loadCachedCompleted();
            notesState = loadCachedNotes();
            renderFixes();
            return;
        }
        const existingIds = new Set();
        (data || []).forEach(row => {
            existingIds.add(row.id);
            completedState[row.id] = row.completed;
            notesState[row.id] = row.note || '';
        });
        await seedDoneFlags(existingIds);
        cacheCompleted();
        cacheNotes();
        renderFixes();
    }

    // ── Supabase: real-time subscription ──
    function subscribeRealtime() {
        sb.channel('seo-tracker-sync')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'seo_tracker' }, (payload) => {
                const row = payload.new;
                if (!row || !row.id) return;
                completedState[row.id] = row.completed;
                notesState[row.id] = row.note || '';
                cacheCompleted();
                cacheNotes();
                updateCard(row.id);
            })
            .subscribe();
    }

    // ── Event: checkbox toggle ──
    document.addEventListener('click', (e) => {
        const checkbox = e.target.closest('.fix-checkbox');
        if (checkbox) {
            e.stopPropagation();
            const id = checkbox.dataset.id;
            completedState[id] = !completedState[id];
            cacheCompleted();
            updateCard(id);
            upsertRow(id, { completed: completedState[id], note: notesState[id] || '' });
            return;
        }
        const header = e.target.closest('.fix-header');
        if (header && !e.target.closest('.fix-checkbox')) {
            header.closest('.fix-card').classList.toggle('open');
        }
    });

    // ── Event: notes auto-save (debounced) ──
    let saveTimeout = {};
    document.addEventListener('input', (e) => {
        if (e.target.classList.contains('notes-textarea')) {
            const id = e.target.dataset.id;
            notesState[id] = e.target.value;
            const indicator = document.querySelector(`.note-indicator[data-id="${id}"]`);
            if (indicator) indicator.classList.toggle('has-note', e.target.value.trim().length > 0);
            const flag = document.querySelector(`.fix-note-flag[data-flag="${id}"]`);
            if (flag) flag.classList.toggle('visible', e.target.value.trim().length > 0);
            clearTimeout(saveTimeout[id]);
            saveTimeout[id] = setTimeout(() => {
                cacheNotes();
                upsertRow(id, { completed: completedState[id] || false, note: notesState[id] });
                const saved = document.querySelector(`[data-saved="${id}"]`);
                if (saved) {
                    saved.classList.add('visible');
                    setTimeout(() => saved.classList.remove('visible'), 1500);
                }
            }, 500);
        }
    });

    // Prevent expand/collapse when clicking inside textarea
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('notes-textarea')) e.stopPropagation();
    }, true);

    // ── Init ──
    loadFromSupabase();
    subscribeRealtime();
    </script>
